@if (user(); as user) {
  <span (click)="redirectToUserPage(user.handle)" (keydown.enter)="redirectToUserPage(user.handle)" tabindex="0">
    @if (showName()) {
      {{ user.displayName }}
    }
    <img
      [src]="user.imageURL"
      [attr.width]="imgWidth() ?? null"
      [attr.height]="imgHeight() ?? null"
      [alt]="'Profil de ' + user.displayName"
    />
  </span>
} @else {
  User is undefined.
}
