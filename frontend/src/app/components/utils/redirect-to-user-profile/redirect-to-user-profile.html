@if (user(); as user) {
  <span (click)="redirectToUserPage(user.id)" (keydown.enter)="redirectToUserPage(user.id)" tabindex="0">
    <img
      [src]="user.imageURL"
      [width]="imgWidth()"
      [height]="imgHeight()"
      alt="photo de profil de {{ user.displayName }}"
    />
    {{ user.displayName }}
  </span>
} @else {
  User is undefined.
}
