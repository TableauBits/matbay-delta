name: Ensure that the github PR is conformant

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  check_commit_has_issue:
    name: Check that the PR name contains a DELTA-issue ID
    if: (! startsWith(github.head_ref, 'dependabot/')) && (github.event.type == 'opened' || github.event.changes.title.from)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title for Jira ticket
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"

          if echo "$PR_TITLE" | grep -qi 'hotfix'; then
            echo "[ignored] PR title contains 'hotfix'"
            exit 0
          fi

          # Otherwise require a Jira ticket like DELTA-123
          if echo "$PR_TITLE" | grep -Eq '(^|[^A-Z0-9])DELTA-[0-9]+([^0-9]|$)'; then
            echo "Jira ticket found in PR title"
          else
            echo "PR title must include a Jira ticket like DELTA-123, unless it contains 'hotfix'"
            exit 1
          fi
